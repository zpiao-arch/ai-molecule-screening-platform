<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="680" height="360" fill="#ffffff"/>
  <text x="340" y="30" font-size="18" font-weight="700" fill="#1a2233" text-anchor="middle">L2 模型版本对比 (471 标注靶, 中位 AUC)</text>
  <text x="340" y="50" font-size="12" fill="#667" text-anchor="middle">"在版本间挑"的 oracle 天花板仅 +0.045 —— 选择树不该按模型版本做</text>

  <!-- bars: value 0.5..1.0 mapped to x 120..620 (500px for 0.5) -->
  <!-- baseline 0.5 at x=120 -->
  <line x1="120" y1="70" x2="120" y2="320" stroke="#ccc" stroke-width="1"/>
  <text x="112" y="324" font-size="10" fill="#889" text-anchor="end">0.50</text>
  <line x1="370" y1="70" x2="370" y2="320" stroke="#eee" stroke-width="1"/>
  <text x="362" y="324" font-size="10" fill="#889" text-anchor="end">0.75</text>
  <line x1="620" y1="70" x2="620" y2="320" stroke="#eee" stroke-width="1"/>
  <text x="612" y="324" font-size="10" fill="#889" text-anchor="end">1.00</text>

  <!-- Hash 0.689 -> x = 120 + (0.689-0.5)/0.5*500 = 120+0.378*500=309 -->
  <rect x="120" y="80" width="189" height="34" rx="4" fill="#2f7ed8"/>
  <text x="316" y="103" font-size="13" font-weight="700" fill="#fff">哈希基线 0.689</text>
  <text x="316" y="120" font-size="10" fill="#335" dx="0">✓ 通用最佳</text>

  <!-- CE 0.571 -> 120+(0.071)*500=155.5 -->
  <rect x="120" y="130" width="36" height="34" rx="4" fill="#c0392b"/>
  <text x="164" y="153" font-size="13" font-weight="700" fill="#c0392b">CE重训 0.571</text>
  <text x="164" y="170" font-size="10" fill="#a33">✗ 聚合退化 (仅 NA 跃升)</text>

  <!-- BPR 0.506 -> 120+(0.006)*500=123 -->
  <rect x="120" y="180" width="3" height="34" rx="2" fill="#e67e22"/>
  <text x="130" y="203" font-size="13" font-weight="700" fill="#e67e22">BPR 0.506</text>
  <text x="130" y="220" font-size="10" fill="#a63">✗ 分数尺度失校准 (≈随机)</text>

  <!-- Oracle ceiling 0.734 -> 120+(0.234)*500=237 -->
  <rect x="120" y="230" width="117" height="34" rx="4" fill="#16a085" stroke="#0c7" stroke-dasharray="4 3"/>
  <text x="245" y="253" font-size="13" font-weight="700" fill="#0a7">Oracle天花板 0.734</text>
  <text x="245" y="270" font-size="10" fill="#066">(完美路由器逐靶选 哈希/CE 的理论上限)</text>

  <!-- NA cascade fusion 0.924 -> separate, different regime -->
  <rect x="120" y="280" width="404" height="34" rx="4" fill="#8e44ad"/>
  <text x="532" y="303" font-size="13" font-weight="700" fill="#fff">NA 级联融合 0.924</text>
  <text x="532" y="320" font-size="10" fill="#525">↑ 另一维度: 有无受体决定的管线分支</text>

  <text x="120" y="345" font-size="11" fill="#889">结论: 单模型重训(CE/BPR)在聚合域均失败 → 不应"在版本间选"; 应选"管线/受体"分支</text>
</svg>
